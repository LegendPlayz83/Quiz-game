<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cozy Corner</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
    :root[data-theme="light"] {
        --bg-deep : #132a13;
        --bg-mid : #31572c;
        --bg-accent : #4f772d;
        --fg-accent : #90a955;
        --fg-light : #ecf39e;
        --glass-bg : rgba(19,42,19,0.72);
        --glass-border : rgba(144,169,85,0.35);
        --card-bg : rgba(49,87,44,0.82);
        --text-primary : #ecf39e;
        --text-muted : rgba(236,243,158,0.65);
        --btn-bg : rgba(79,119,45,0.6);
        --btn-hover : rgba(144,169,85,0.5);
        --ring : #90a955;
        --ring-track : rgba(144,169,85,0.25);
        --shadow : rgba(19,42,19,0.7);
        --todo-done : rgba(144,169,85,0.4);
    }
    :root[data-theme="dark"]{
        --bg-deep : #0a1628;
        --bg-mid : #0c2040;
        --bg-accent : #185fa5;
        --fg-accent : #378add;
        --fg-light : #cde8fb;
        --glass-bg : rgba(4,21,53,0.78);
        --glass-border : rgba(55,138,221,0.35);
        --card-bg : rgba(12,32,64,0.85);
        --text-primary : #cde8fb;
        --text-muted : rgba(181,212,244,0.6);
        --btn-bg : rgba(24,95,165,0.55);
        --btn-hover : rgba(55,138,221,0.45);
        --ring : #378add;
        --ring-track : rgba(55,138,221,0.22);
        --shadow : rgba(4,20,50,0.75);
        --todo-done : rgba(55,138,221,0.35);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0;
    }
    html, body{
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: 'Lato', sans-serif;
    }
    body{
        background: var(--bg-deep);
        color: var(--text-primary);
        transition: background 0.6s ease, color 0.4s ease;
        position: relative;
    }
    #scene{
        position: fixed;
        inset:0;
        z-index: 0;
        overflow: hidden;
    }
    #bg-image{
        position: absolute;
        inset: 0;
        background-size: cover;
        background-position: center;
        opacity: 0;
        transition: opacity 0.8s ease;        
    }
    #bg-image.loaded { opacity: 1; }
    #scene svg{
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        transition: opacity 0.6s ease;
    }
    #vignette {
        position: fixed;
        inset: 0;
        z-index: 1;
        background: radial-gradient(ellipse at 50% 40%, transparent 30%, rgba(0,0,0,0.45) 100%);
        pointer-events: none;
    }
    #app {
        position: fixed;
        inset: 0;
        z-index: 2;
        pointer-events: none;
    }
    #app > * { pointer-events: auto; }
    #topbar{
        position: absolute;
        top: 0; left: 0; right: 0;
        padding: 18px 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    #logo{
        font-family: 'Playfair Display' , serif;
        font-size: 1.5rem;
        font-weight: 600;
        color: var(--fg-light);
        letter-spacing: 0.02em;
        text-shadow: 0 2px 12px var(--shadow);
        user-select: none;
    }
    #logo span{
        font-style: italic;
        font-weight: 400;
        opacity: 0.75;
        font-size: 1rem;
    }
    #topbar-right{
        display: flex;
        align-items: center;
        gap: 14px;
    }
    #theme-toggle{
        position: relative;
        width: 52px; height: 28px;
        cursor: pointer;
    }
    #theme-toggle input{ opacity: 0; width: 0; height: 0;}
    .toggle-track{
        position: absolute;
        inset:0;
        border-radius: 28px;
        background: var(--btn-bg);
        border: 1px solid var(--glass-border);
        transition: background 0.4s;
    }
    .toggle-thumb{
        position: absolute;
        top: 4px; left: 4px;
        width: 20px; height: 20px;
        border-radius: 50%;
        background: var(--fg-light);
        transition: transform 0.35s cubic-bezier(.4,0,.2,1), background 0.4s;
        display: flex; align-items: center; justify-content: center;
        font-size: 11px;
    }
    #theme-toggle input:checked ~ .toggle-track { background: var(--btn-hover); }
    #theme-toggle input:checked ~ .toggle-thumb { transform: translateX(24px); }
    .icon-btn{
        width: 40px; height: 40px;
        border-radius: 50%;
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        backdrop-filter: blur(12px);
        display: flex; align-items: center; justify-content: center;
        cursor: pointer;
        color: var(--fg-light);
        font-size: 18px;
        transition: background 0.2s, transform 0.15s;
    }
    .icon-btn:hover { background: var(--btn-hover); transform: scale(1.08); }
    .icon-btn svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .glass-panel{
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        backdrop-filter: blur(18px) saturate(1.4);
        border-radius: 18px;
        box-shadow: 0 8px 40px var(--shadow);
        transition: background 0.5s, border 0.5s;
    }
    #sound-panel{
        position: absolute;
        top: 72px; right: 28px;
        width: 290px; padding: 22px;
        transform: translateX(calc(100% + 20px));
        opacity: 0;
        transition: transform 0.4s cubic-bezier(.4,0,.2,1), opacity 0.3s;
    }
    #sound-panel.open{
        transform: translateX(0);
        opacity: 1;
    }
    .panel-title{
        font-family: 'Playfair Display', sans-serif;
        font-size: 1.05rem; font-weight: 600;
        color: var(--fg-light);
        margin-bottom: 18px;
        display: flex; align-items: center; gap: 8px;
    }
    .panel-title svg { width: 18px; height: 18px; fill: none; stroke: var(--fg-accent); stroke-width: 1.8; stroke-linecap: round; }
    .sound-row{
        display: flex; align-items: center; gap: 10px;
        margin-bottom: 14px;
    }
    .sound-icon{
        width: 32px; height: 32px;
        border-radius: 8px;
        background: var(--btn-bg);
        border: 1px solid var(--glass-border);
        display: flex; align-items: center; justify-content: center;
        font-size: 15px;
        cursor: pointer;
        flex-shrink: 0;
        transition: background 0.2s, transform 0.15s;
        user-select: none;
    }
    .sound-icon:hover { background: var(--btn-hover); transform: scale(1.1); }
    .sound-icon.active { background: var(--btn-hover); box-shadow: 0 0 0 2px var(--ring); }
    .sound-label{
        font-size: 0.78rem; font-weight: 300;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text-muted);
        width: 52px;
        flex-shrink: 0;
    }
    .sound-slider{
        flex: 1;
        -webkit-appearance: none; appearance: none;
        height: 4px; border-radius: 4px;
        background: var(--ring-track);
        outline: none; cursor: pointer;
    }
    .sound-slider ::-webkit-slider-thumb{
        -webkit-appearance: none; appearance: none;
        width: 14px; height: 14px;
        border-radius: 50%;
        background: var(--ring);
        border: 2px solid var(--fg-light);
        cursor: pointer; transition: transform 0.15s;
    }
    .sound-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }
    .sound-slider::-moz-range-thumb{
        width: 14px; height: 14px;
        border-radius: 50%;
        background: var(--ring);
        border: 2px solid var(--fg-light);
        cursor: pointer;    
    }
    .master-vol{
        margin-top: 18px; padding-top: 14px;
        border-top: 1px solid var(--glass-border);
    }
    .master-label{
        font-size: 0.72rem; letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 8px;
    }
    #todo-panel{
        position: absolute;
        bottom: 28px; left: 28px;
        width: 280px; max-height: 340px;
        padding: 20px;
        display: flex; flex-direction: column;
    }
    .todo-header{
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 14px;
    }
    .todo-input-row{
        display: flex; gap: 8px; margin-bottom: 12px;
    }
    .todo-input{
        flex:1; 
        background: var(--btn-bg);
        border: 1px solid var(--glass-border);
        border-radius: 8px;
        padding: 7px 11px;
        color: var(--text-primary);
        font-family: 'Lato', sans-serif; font-size: 0.82rem;
        outline: none; transition: border 0.2s;
    }
    .todo-input::placeholder { color: var(--text-muted); }
    .todo-input:focus { border-color: var(--ring); }
    .todo-add-btn{
        width: 32px; height: 32px; border-radius: 8px;
        background: var(--fg-accent);
        border: none;
        color: var(--bg-deep);
        font-size: 20px; font-weight: 300;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: background 0.2s, transform 0.15s;
        flex-shrink: 0;
    }
    .todo-add-btn:hover { background: var(--fg-light); transform: scale(1.08); }
    .todo-list{
        list-style: none; overflow-y: auto; flex: 1;
        scrollbar-width: thin; scrollbar-color: var(--glass-border) transparent;
    }
    .todo-item{
        display: flex; align-items: center; gap: 8px;
        padding: 7px 4px;
        border-bottom: 1px solid rgba(255,255,255,0.07);
        cursor: pointer; transition: background 0.15s;
        border-radius: 6px;
        animation: slideIn 0.25s ease;
    }
    .todo-item:hover { background: var(--btn-bg); }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: none; } }
    .todo-check{
        width: 16px; height: 16px;
        border-radius: 4px;
        flex-shrink: 0;
        border: 1.5px solid var(--ring);
        background: transparent;
        display: flex; align-items: center; justify-content: center;
        transition: background 0.2s;
    }
    .todo-check.done { background: var(--todo-done); }
    .todo-check.done::after {
    content: '✓'; font-size: 10px; color: var(--fg-light);
    }
    .todo-text {
    font-size: 0.82rem; font-weight: 300; flex: 1; line-height: 1.3;
    transition: opacity 0.2s, text-decoration 0.2s;
    }
    .todo-text.done { opacity: 0.45; text-decoration: line-through; }
    .todo-del{
        opacity: 0; font-size: 14px; cursor: pointer;
        color: var(--text-muted);
        transition: opacity 0.15s;
        padding: 2px 4px;
    }
    .todo-item:hover .todo-del { opacity: 0.7; }
    .todo-del:hover { opacity: 1 !important; color: #f88; }
    .todo-stats{
        margin-top: 8px; font-size: 0.7rem;
        color: var(--text-muted);
        letter-spacing: 0.05em;
    }
    #pomo-panel{
        position: absolute; bottom: 28px; right: 28px;
        width: 220px; padding: 22px 20px;
        text-align: center;
        cursor: move; user-select: none;
    }
    .pomo-mode-tabs{
        display: flex; gap: 6px; margin-bottom: 18px;
        justify-content: center;
    }
    .pomo-tab{
        font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase;
        padding: 4px 10px; border-radius: 10px; cursor: pointer;
        border: 1px solid var(--glass-border); color: var(--text-muted);
        transition: all 0.2s; background: transparent;
    }
    .pomo-tab.active{
        background: var(--btn-hover);
        color: var(--fg-light);
        border-color: var(--ring);
    }
    .pomo-ring-wrap{
        position: relative; width: 130px; height: 130px;
        margin: 0 auto 16px;
    }
    .pomo-ring-wrap svg{
        width: 130px; height: 130px;
        transform: rotate(-90deg);
    }
    .pomo-ring-bg { fill: none; stroke: var(--ring-track); stroke-width: 6; }
    .pomo-ring-prog{
        fill: none; stroke: var(--ring); stroke-width: 6;
        stroke-linecap: round; stroke-dasharray: 345; stroke-dashoffset: 0;
        transition: stroke-dashoffset 1s linear, stroke 0.5s;
    }
    .pomo-time-display{
        position: absolute; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
    }
    .pomo-time{
        font-family: 'Playfair Display', sans-serif;
        font-size: 1.5rem; font-weight: 600;
        color: var(--fg-light); line-height: 1;
    }
    .pomo-session-label{
        font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase;
        color: var(--text-muted); 
        margin-top: 4px;
    }
    .pomo-controls{
        display: flex; gap: 10px; justify-content: center; align-items: center;
    }
    .pomo-btn{
        background: var(--btn-bg); border: 1px solid var(--glass-border);
        border-radius: 50%; color: var(--fg-light);
        cursor: pointer; transition: background 0.2s, transform 0.15s;
        display: flex; align-items: center; justify-content: center;
    }
    .pomo-btn:hover { background: var(--btn-hover); transform: scale(1.1); }
    .pomo-btn.main { width: 44px; height: 44px; font-size: 22px; }
    .pomo-btn.sm   { width: 32px; height: 32px; font-size: 16px; }
    .pomo-btn svg  { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; }
    .pomo-btn.main svg { width: 22px; height: 22px; }
    .pomo-sessions{
        margin-top: 12px; font-size: 0.68rem; color: var(--text-muted);
        letter-spacing: 0.05em;
    }
    .pomo-dot{
        display: inline-block; width: 7px; height: 7px; border-radius: 50%;
        background: var(--ring-track);
        margin: 0 2px;
        transition: background 0.3s;
    }
    .pomo-dot.done { background: var(--ring); }
    #clock{
        position: absolute; top: 22px; left: 50%;
        transform: translateX(-50%);
        font-family: 'Playfair Display', sans-serif; font-size: 1.1rem;
        color: var(--text-muted); letter-spacing: 0.1em;
        text-shadow: 0 2px 8px var(--shadow);
        pointer-events: none;
    }
    #bg-upload-hint{
        position: absolute; bottom: 28px; left: 50%;
        transform: translateX(-50%);
        font-size: 0.7rem; color: var(--text-muted); letter-spacing: 0.05em;
        display: flex; align-items: center; gap: 6px; cursor: pointer;
        padding: 6px 14px; border-radius: 20px;
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        backdrop-filter: blur(10px); transition: opacity 0.3s;
        opacity: 0.5;
    }
    #bg-upload-hint:hover { opacity: 1; }
    #bg-file { display: none; }
    #toast{
        position: fixed; bottom: 80px; left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: var(--card-bg); border: 1px solid var(--glass-border);
        backdrop-filter: blur(14px); border-radius: 10px;
        padding: 10px 20px; font-size: 0.82rem; color: var(--fg-light);
        opacity: 0; pointer-events: none; z-index: 99;
        transition: opacity 0.3s, transform 0.3;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 4px; }
    </style>
    </head>
