<html>
    <head>
        <title>OG Quiz</title>
        <link href="https://fonts.googleapis.com/css2?family=Kumar+One&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <h1>The OG Quiz</h1>
            <h3>by Aditya Roy</h3>

            <div id="genre-screen">
                <p>Pick a genre</p>
                <button onclick="startQuiz('Taylor Swift')">Taylor Swift</button>
                <button onclick="startQuiz('Bollywood')">Bollywood</button>
                <button onclick="startQuiz('Science')">Science</button>
                <button onclick="startQuiz('Geography')">Geography</button>
            </div>
            
            <div id="quiz-screen" class="hidden">
                <p id="progress">Question 1 of 5</p>
                <p id="question-text"></p>
                <div id="options"></div>
            </div>

            <div id="result-screen" class="hidden">
                <p id="score-display"></p>
                <button onclick="resetQuiz()">Play Again</button>
            </div>

        </div>
        <script src="script.js"></script>
    </body>
</html>
